<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3250;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --text:      #e2e8f0;
      --muted:     #8892b0;
      --danger:    #f87171;
      --success:   #34d399;
      --warning:   #fbbf24;
      --info:      #60a5fa;

      --todo-clr:      #6c63ff;
      --progress-clr:  #fbbf24;
      --done-clr:      #34d399;
      --cancelled-clr: #f87171;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
    }
    .logo h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .5px; }

    .nav { display: flex; flex-direction: column; gap: 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 500;
      transition: background .15s, color .15s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(108,99,255,.18); color: var(--accent2); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

    .stats-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .stats-box h3 { font-size: .75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: .85rem; }
    .stat-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px;
    }
    .stat-count { font-weight: 700; }

    /* ── Main ── */
    .main { padding: 32px; overflow-y: auto; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 14px;
    }
    .topbar h2 { font-size: 1.5rem; font-weight: 700; }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 10px; border: none;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      transition: filter .15s, transform .1s;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .btn-ghost {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-danger { background: rgba(248,113,113,.15); color: var(--danger); border: 1px solid rgba(248,113,113,.3); }
    .btn-sm { padding: 5px 12px; font-size: .78rem; }

    /* ── Filters ── */
    .filters {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap input {
      width: 100%; padding: 9px 14px 9px 38px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: .88rem;
      outline: none; transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 14px; pointer-events: none;
    }
    select.filter-select {
      padding: 9px 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: .88rem; outline: none;
      cursor: pointer; transition: border-color .15s;
    }
    select.filter-select:focus { border-color: var(--accent); }

    /* ── Alert banners ── */
    .alert-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .alert {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: 10px; font-size: .85rem; font-weight: 500;
    }
    .alert-danger  { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--danger); }
    .alert-warning { background: rgba(251,191,36,.1); border: 1px solid rgba(251,191,36,.3); color: var(--warning); }
    .alert.hidden { display: none; }

    /* ── Task grid ── */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      display: flex; flex-direction: column; gap: 12px;
      transition: transform .15s, border-color .15s, box-shadow .15s;
      position: relative;
      overflow: hidden;
    }
    .task-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 4px; height: 100%;
      border-radius: 4px 0 0 4px;
    }
    .task-card[data-stato="TODO"]::before       { background: var(--todo-clr); }
    .task-card[data-stato="IN_PROGRESS"]::before { background: var(--progress-clr); }
    .task-card[data-stato="DONE"]::before        { background: var(--done-clr); }
    .task-card[data-stato="CANCELLED"]::before   { background: var(--cancelled-clr); }

    .task-card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 8px 24px rgba(0,0,0,.35); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-title { font-weight: 700; font-size: .97rem; }
    .badge {
      padding: 3px 10px; border-radius: 20px; font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px; white-space: nowrap;
    }
    .badge-TODO       { background: rgba(108,99,255,.2); color: var(--todo-clr); }
    .badge-IN_PROGRESS { background: rgba(251,191,36,.2); color: var(--progress-clr); }
    .badge-DONE        { background: rgba(52,211,153,.2); color: var(--done-clr); }
    .badge-CANCELLED   { background: rgba(248,113,113,.2); color: var(--cancelled-clr); }

    .card-desc { font-size: .83rem; color: var(--muted); line-height: 1.5; }

    .card-meta { display: flex; gap: 14px; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 5px; font-size: .78rem; color: var(--muted); }
    .meta-item.overdue { color: var(--danger); }
    .meta-item.soon    { color: var(--warning); }

    .priority-pip {
      display: inline-flex; align-items: center; gap: 5px; font-size: .78rem; color: var(--muted);
    }
    .pip { width: 7px; height: 7px; border-radius: 50%; }
    .pip-1 { background: var(--success); }
    .pip-2 { background: var(--info); }
    .pip-3 { background: var(--warning); }
    .pip-4, .pip-5 { background: var(--danger); }

    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center; padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
      display: grid; place-items: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      width: min(480px, 95vw);
      transform: translateY(20px);
      transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
    .modal-header h3 { font-size: 1.1rem; font-weight: 700; }
    .close-btn {
      background: none; border: none; color: var(--muted);
      font-size: 20px; cursor: pointer; line-height: 1;
      transition: color .15s;
    }
    .close-btn:hover { color: var(--text); }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: .8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .form-group input,
    .form-group textarea,
    .form-group select {
      padding: 10px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: .9rem;
      outline: none; transition: border-color .15s; font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .error-msg { font-size: .8rem; color: var(--danger); margin-top: 4px; }

    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 6px; }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px; z-index: 200;
    }
    .toast {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 18px;
      font-size: .85rem; font-weight: 500;
      display: flex; align-items: center; gap: 10px;
      animation: slideIn .25s ease;
      max-width: 320px;
    }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error   { border-left: 4px solid var(--danger); }
    .toast.info    { border-left: 4px solid var(--info); }

    @keyframes slideIn {
      from { transform: translateX(60px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">✓</div>
      <h1>Task Manager</h1>
    </div>

    <nav class="nav">
      <button class="nav-item active" onclick="setView('all')">
        <span class="icon">📋</span> Tutti i task
      </button>
      <button class="nav-item" onclick="setView('scaduti')">
        <span class="icon">⚠️</span> Scaduti
      </button>
      <button class="nav-item" onclick="setView('in-scadenza')">
        <span class="icon">🕐</span> In scadenza
      </button>
    </nav>

    <div class="stats-box">
      <h3>Riepilogo</h3>
      <div class="stat-row">
        <span><span class="stat-dot" style="background:var(--todo-clr)"></span>Da fare</span>
        <span class="stat-count" id="cnt-todo">—</span>
      </div>
      <div class="stat-row">
        <span><span class="stat-dot" style="background:var(--progress-clr)"></span>In corso</span>
        <span class="stat-count" id="cnt-progress">—</span>
      </div>
      <div class="stat-row">
        <span><span class="stat-dot" style="background:var(--done-clr)"></span>Completati</span>
        <span class="stat-count" id="cnt-done">—</span>
      </div>
      <div class="stat-row">
        <span><span class="stat-dot" style="background:var(--cancelled-clr)"></span>Annullati</span>
        <span class="stat-count" id="cnt-cancelled">—</span>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="topbar">
      <h2 id="view-title">Tutti i task</h2>
      <button class="btn btn-primary" onclick="openModal()">＋ Nuovo Task</button>
    </div>

    <!-- Alert banners -->
    <div class="alert-section" id="alerts"></div>

    <!-- Filters (visibili solo nella vista "all") -->
    <div class="filters" id="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Cerca per titolo…" oninput="loadTasks()" />
      </div>
      <select class="filter-select" id="stato-filter" onchange="loadTasks()">
        <option value="">Tutti gli stati</option>
        <option value="TODO">Da fare</option>
        <option value="IN_PROGRESS">In corso</option>
        <option value="DONE">Completati</option>
        <option value="CANCELLED">Annullati</option>
      </select>
    </div>

    <!-- Task grid -->
    <div class="tasks-grid" id="task-grid"></div>
  </main>
</div>

<!-- ── Modal crea task ── -->
<div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>Nuovo Task</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <form id="task-form" onsubmit="submitTask(event)">
      <div class="form-group">
        <label>Titolo</label>
        <input type="text" id="f-titolo" placeholder="Es. Rivedere documentazione" />
      </div>
      <div class="form-group">
        <label>Descrizione <span style="color:var(--muted)">(3–20 car.)</span></label>
        <textarea id="f-desc" placeholder="Breve descrizione…"></textarea>
        <span class="error-msg" id="desc-error"></span>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Priorità (1 = alta)</label>
          <input type="number" id="f-priorita" min="1" max="5" value="3" />
        </div>
        <div class="form-group">
          <label>Scadenza</label>
          <input type="date" id="f-scadenza" />
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Annulla</button>
        <button type="submit" class="btn btn-primary">Crea Task</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Toast container ── -->
<div class="toast-container" id="toasts"></div>

<script>
  const API = '/tasks';
  let currentView = 'all';
  let allTasks = [];

  // ── Utilities ──────────────────────────────────────────────
  function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
    document.getElementById('toasts').append(el);
    setTimeout(() => el.remove(), 3500);
  }

  function formatDate(d) {
    if (!d) return null;
    const [y, m, dd] = d.split('-');
    return `${dd}/${m}/${y}`;
  }

  function isOverdue(scadenza, stato) {
    if (!scadenza || stato === 'DONE' || stato === 'CANCELLED') return false;
    return new Date(scadenza) < new Date(new Date().toDateString());
  }

  function isSoon(scadenza, stato, days = 7) {
    if (!scadenza || stato === 'DONE' || stato === 'CANCELLED') return false;
    const d = new Date(scadenza);
    const now = new Date(new Date().toDateString());
    const limit = new Date(now); limit.setDate(limit.getDate() + days);
    return d >= now && d <= limit;
  }

  function priorityLabel(p) {
    const labels = { 1: 'Critica', 2: 'Alta', 3: 'Media', 4: 'Bassa', 5: 'Minima' };
    return labels[p] || p;
  }

  // ── Navigation ─────────────────────────────────────────────
  function setView(view) {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.nav-item')[['all','scaduti','in-scadenza'].indexOf(view)].classList.add('active');

    const titles = { all: 'Tutti i task', scaduti: 'Task scaduti', 'in-scadenza': 'Task in scadenza (7 giorni)' };
    document.getElementById('view-title').textContent = titles[view];
    document.getElementById('filter-bar').style.display = view === 'all' ? 'flex' : 'none';
    loadTasks();
  }

  // ── API calls ──────────────────────────────────────────────
  async function loadTasks() {
    try {
      let url;
      if (currentView === 'scaduti') {
        url = `${API}/scaduti`;
      } else if (currentView === 'in-scadenza') {
        url = `${API}/in-scadenza?giorni=7`;
      } else {
        const stato  = document.getElementById('stato-filter').value;
        const search = document.getElementById('search-input').value;
        const params = new URLSearchParams();
        if (stato)  params.set('stato', stato);
        if (search) params.set('search', search);
        url = `${API}?${params}`;
      }

      const res = await fetch(url);
      if (!res.ok) throw new Error('Errore nel caricamento');
      const tasks = await res.json();

      if (currentView === 'all') {
        allTasks = tasks;
        updateStats();
        updateAlerts();
      }

      renderGrid(tasks);
    } catch (e) {
      toast('Errore: ' + e.message, 'error');
    }
  }

  async function loadAllForStats() {
    try {
      const res = await fetch(API);
      if (!res.ok) return;
      allTasks = await res.json();
      updateStats();
      updateAlerts();
    } catch {}
  }

  async function deleteTask(id) {
    if (!confirm('Eliminare questo task?')) return;
    try {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      toast('Task eliminato', 'success');
      loadTasks();
      if (currentView !== 'all') loadAllForStats();
    } catch (e) {
      toast('Errore eliminazione', 'error');
    }
  }

  async function changeState(id, newState) {
    try {
      const res = await fetch(`${API}/${id}?stato=${newState}`, { method: 'PUT' });
      if (!res.ok) {
        const msg = await res.text();
        toast(msg, 'error'); return;
      }
      toast('Stato aggiornato', 'success');
      loadTasks();
      if (currentView !== 'all') loadAllForStats();
    } catch (e) {
      toast('Errore aggiornamento', 'error');
    }
  }

  // ── Stats & Alerts ─────────────────────────────────────────
  function updateStats() {
    const count = s => allTasks.filter(t => t.stato === s).length;
    document.getElementById('cnt-todo').textContent      = count('TODO');
    document.getElementById('cnt-progress').textContent  = count('IN_PROGRESS');
    document.getElementById('cnt-done').textContent      = count('DONE');
    document.getElementById('cnt-cancelled').textContent = count('CANCELLED');
  }

  async function updateAlerts() {
    const alertsEl = document.getElementById('alerts');
    alertsEl.innerHTML = '';
    try {
      const [scR, snR] = await Promise.all([
        fetch(`${API}/scaduti`),
        fetch(`${API}/in-scadenza?giorni=7`)
      ]);
      const scaduti   = await scR.json();
      const inScadenza = await snR.json();

      if (scaduti.length > 0) {
        alertsEl.insertAdjacentHTML('beforeend', `
          <div class="alert alert-danger">
            ⚠️ <strong>${scaduti.length} task scadut${scaduti.length === 1 ? 'o' : 'i'}</strong> — clicca "Scaduti" per vederli
          </div>`);
      }
      const soloProssimi = inScadenza.filter(t => !isOverdue(t.scadenza, t.stato));
      if (soloProssimi.length > 0) {
        alertsEl.insertAdjacentHTML('beforeend', `
          <div class="alert alert-warning">
            🕐 <strong>${soloProssimi.length} task</strong> in scadenza nei prossimi 7 giorni
          </div>`);
      }
    } catch {}
  }

  // ── Render ─────────────────────────────────────────────────
  function nextStates(stato) {
    const map = {
      TODO:        [{ value: 'IN_PROGRESS', label: '▶ Inizia' }],
      IN_PROGRESS: [{ value: 'DONE',        label: '✓ Completa' }, { value: 'CANCELLED', label: '✕ Annulla' }],
      DONE:        [],
      CANCELLED:   []
    };
    return map[stato] || [];
  }

  function stateLabel(s) {
    const m = { TODO: 'Da fare', IN_PROGRESS: 'In corso', DONE: 'Completato', CANCELLED: 'Annullato' };
    return m[s] || s;
  }

  function renderGrid(tasks) {
    const grid = document.getElementById('task-grid');
    if (!tasks.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>Nessun task trovato</p>
        </div>`;
      return;
    }

    grid.innerHTML = tasks.map(t => {
      const overdue = isOverdue(t.scadenza, t.stato);
      const soon    = !overdue && isSoon(t.scadenza, t.stato);
      const actions = nextStates(t.stato).map(ns =>
        `<button class="btn btn-ghost btn-sm" onclick="changeState(${t.id},'${ns.value}')">${ns.label}</button>`
      ).join('');

      const dateClass = overdue ? 'overdue' : soon ? 'soon' : '';
      const dateIcon  = overdue ? '🔴' : soon ? '🟡' : '📅';

      return `
        <div class="task-card" data-stato="${t.stato}">
          <div class="card-header">
            <span class="card-title">${t.titolo || '(senza titolo)'}</span>
            <span class="badge badge-${t.stato}">${stateLabel(t.stato)}</span>
          </div>
          <p class="card-desc">${t.descrizione || ''}</p>
          <div class="card-meta">
            <span class="priority-pip">
              <span class="pip pip-${Math.min(t.priorita, 5)}"></span>
              P${t.priorita} – ${priorityLabel(t.priorita)}
            </span>
            ${t.scadenza ? `<span class="meta-item ${dateClass}">${dateIcon} ${formatDate(t.scadenza)}</span>` : ''}
          </div>
          <div class="card-actions">
            ${actions}
            <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">🗑 Elimina</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── Modal ──────────────────────────────────────────────────
  function openModal() {
    document.getElementById('task-form').reset();
    document.getElementById('desc-error').textContent = '';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function closeModalOnOverlay(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  async function submitTask(e) {
    e.preventDefault();
    const titolo     = document.getElementById('f-titolo').value.trim();
    const descrizione = document.getElementById('f-desc').value.trim();
    const priorita   = parseInt(document.getElementById('f-priorita').value) || 3;
    const scadenza   = document.getElementById('f-scadenza').value || null;

    document.getElementById('desc-error').textContent = '';
    if (descrizione.length < 3 || descrizione.length > 20) {
      document.getElementById('desc-error').textContent = 'La descrizione deve essere tra 3 e 20 caratteri';
      return;
    }

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ titolo, descrizione, priorita, scadenza })
      });
      if (!res.ok) throw new Error('Errore nella creazione');
      closeModal();
      toast('Task creato con successo!', 'success');
      if (currentView !== 'all') setView('all'); else loadTasks();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── Init ───────────────────────────────────────────────────
  loadTasks();
</script>
</body>
</html>
