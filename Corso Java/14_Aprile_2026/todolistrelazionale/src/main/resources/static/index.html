<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TodoList Relazionale</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273549;
      --border: #334155;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --radius: 10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    header span { font-size: 1.5rem; }

    nav {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 2rem 0;
    }
    .tab-btn {
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover { background: var(--surface2); color: var(--text); }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    main { padding: 1.5rem 2rem 3rem; max-width: 900px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    /* ---- FORM ---- */
    .form-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    input[type="text"], select {
      flex: 1;
      min-width: 160px;
      padding: 0.55rem 0.9rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    button {
      padding: 0.55rem 1.1rem;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger  { background: transparent; color: var(--red); border: 1px solid var(--red); padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    .btn-danger:hover  { background: var(--red); color: #fff; }
    .btn-success { background: transparent; color: var(--green); border: 1px solid var(--green); padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    .btn-success:hover { background: var(--green); color: #fff; }
    .btn-warn    { background: transparent; color: var(--yellow); border: 1px solid var(--yellow); padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    .btn-warn:hover    { background: var(--yellow); color: #fff; }
    .btn-ghost   { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    .btn-ghost:hover   { color: var(--text); border-color: var(--text); }

    /* ---- CARD LIST ---- */
    .list { display: flex; flex-direction: column; gap: 0.6rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .card-title { flex: 1; font-weight: 500; }
    .card-id { font-size: 0.75rem; color: var(--text-muted); background: var(--surface2); padding: 0.15rem 0.5rem; border-radius: 999px; }

    .badge {
      font-size: 0.72rem;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-weight: 600;
    }
    .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-gray  { background: rgba(148,163,184,0.15); color: var(--text-muted); }

    /* commenti accordion */
    .card-body { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
    .comment-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.35rem 0;
      font-size: 0.88rem;
      color: var(--text-muted);
    }
    .comment-item span { flex: 1; }

    .empty { color: var(--text-muted); font-size: 0.85rem; padding: 0.5rem 0; font-style: italic; }

    /* toast */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      color: var(--text);
      padding: 0.75rem 1.2rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 99;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-left-color: var(--red); }
  </style>
</head>
<body>

<header>
  <span>✅</span>
  <h1>TodoList Relazionale</h1>
</header>

<nav>
  <button class="tab-btn active" onclick="switchTab('utenti')">👤 Utenti</button>
  <button class="tab-btn"        onclick="switchTab('todo')">📋 Todo</button>
  <button class="tab-btn"        onclick="switchTab('commenti')">💬 Commenti</button>
</nav>

<main>

  <!-- ========== UTENTI ========== -->
  <div id="tab-utenti" class="tab-panel active">
    <h2>Utenti</h2>

    <div class="form-row">
      <input type="text" id="utente-nome" placeholder="Nome utente…" />
      <button class="btn-primary" onclick="creaUtente()">+ Aggiungi</button>
    </div>

    <div class="list" id="utenti-list"></div>
  </div>

  <!-- ========== TODO ========== -->
  <div id="tab-todo" class="tab-panel">
    <h2>Todo</h2>

    <div class="form-row">
      <input type="text" id="todo-desc" placeholder="Descrizione todo…" />
      <select id="todo-utente"></select>
      <button class="btn-primary" onclick="creaTodo()">+ Aggiungi</button>
    </div>

    <div class="list" id="todo-list"></div>
  </div>

  <!-- ========== COMMENTI ========== -->
  <div id="tab-commenti" class="tab-panel">
    <h2>Commenti</h2>

    <div class="form-row">
      <input type="text" id="commento-testo" placeholder="Testo commento…" />
      <select id="commento-todo"></select>
      <button class="btn-primary" onclick="creaCommento()">+ Aggiungi</button>
    </div>

    <div class="list" id="commenti-list"></div>
  </div>

</main>

<div id="toast"></div>

<script>
  const BASE = '';

  /* ---- util ---- */
  async function api(method, url, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(BASE + url, opts);
    if (!res.ok) throw new Error(await res.text());
    const ct = res.headers.get('content-type') || '';
    return ct.includes('json') ? res.json() : res.text();
  }

  let toastTimer;
  function toast(msg, error = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (error ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 2800);
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
    if (name === 'todo') loadTodo();
    if (name === 'commenti') loadCommenti();
  }

  /* ========== UTENTI ========== */
  async function loadUtenti() {
    const utenti = await api('GET', '/utenti');
    const list = document.getElementById('utenti-list');
    list.innerHTML = '';

    if (!utenti.length) { list.innerHTML = '<p class="empty">Nessun utente.</p>'; return; }

    // aggiorna selects
    ['todo-utente'].forEach(selId => {
      const sel = document.getElementById(selId);
      sel.innerHTML = utenti.map(u => `<option value="${u.id}">${u.nome}</option>`).join('');
    });

    for (const u of utenti) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <span class="card-id">#${u.id}</span>
          <span class="card-title">${esc(u.nome)}</span>
          <button class="btn-ghost" onclick="toggleTodoUtente(${u.id}, this)">📋 Todo</button>
          <button class="btn-danger" onclick="eliminaUtente(${u.id})">🗑 Elimina</button>
        </div>
        <div class="card-body" id="todo-utente-${u.id}" style="display:none"></div>
      `;
      list.appendChild(card);
    }
  }

  async function toggleTodoUtente(id, btn) {
    const body = document.getElementById('todo-utente-' + id);
    if (body.style.display !== 'none') { body.style.display = 'none'; return; }
    body.style.display = 'block';
    body.innerHTML = '<span class="empty">Caricamento…</span>';
    try {
      const todos = await api('GET', `/utenti/${id}/todo`);
      if (!todos.length) { body.innerHTML = '<p class="empty">Nessun todo.</p>'; return; }
      body.innerHTML = todos.map(t => `
        <div class="comment-item">
          <span class="card-id">#${t.id}</span>
          <span>${esc(t.descrizione)}</span>
          <span class="badge ${t.completato ? 'badge-green' : 'badge-gray'}">${t.completato ? '✓ Fatto' : '⏳ Aperto'}</span>
        </div>`).join('');
    } catch(e) { body.innerHTML = `<p class="empty">${e.message}</p>`; }
  }

  async function creaUtente() {
    const nome = document.getElementById('utente-nome').value.trim();
    if (!nome) { toast('Inserisci un nome', true); return; }
    try {
      await api('POST', '/utenti', { nome });
      document.getElementById('utente-nome').value = '';
      toast('Utente creato!');
      loadUtenti();
    } catch(e) { toast(e.message, true); }
  }

  async function eliminaUtente(id) {
    if (!confirm('Eliminare questo utente e tutti i suoi todo?')) return;
    try {
      await api('DELETE', `/utenti/${id}`);
      toast('Utente eliminato');
      loadUtenti();
    } catch(e) { toast(e.message, true); }
  }

  /* ========== TODO ========== */
  async function loadTodo() {
    const [todos, utenti] = await Promise.all([api('GET', '/todo'), api('GET', '/utenti')]);

    // aggiorna select utenti nel form todo
    const selU = document.getElementById('todo-utente');
    selU.innerHTML = utenti.map(u => `<option value="${u.id}">${u.nome}</option>`).join('');

    const list = document.getElementById('todo-list');
    list.innerHTML = '';
    if (!todos.length) { list.innerHTML = '<p class="empty">Nessun todo.</p>'; return; }

    // aggiorna select todo nel form commenti
    const selC = document.getElementById('commento-todo');
    if (selC) selC.innerHTML = todos.map(t => `<option value="${t.id}">${t.descrizione}</option>`).join('');

    for (const t of todos) {
      const card = document.createElement('div');
      card.className = 'card';
      const uNome = t.utente ? esc(t.utente.nome) : '—';
      card.innerHTML = `
        <div class="card-header">
          <span class="card-id">#${t.id}</span>
          <span class="card-title">${esc(t.descrizione)}</span>
          <span class="badge ${t.completato ? 'badge-green' : 'badge-gray'}">${t.completato ? '✓ Fatto' : '⏳ Aperto'}</span>
          <span style="font-size:0.8rem;color:var(--text-muted)">👤 ${uNome}</span>
          <button class="btn-warn" onclick="toggleCompletato(${t.id}, ${t.completato}, '${esc(t.descrizione)}')">${t.completato ? '↩ Riapri' : '✓ Completa'}</button>
          <button class="btn-ghost" onclick="toggleCommentiTodo(${t.id}, this)">💬 Commenti</button>
          <button class="btn-danger" onclick="eliminaTodo(${t.id})">🗑</button>
        </div>
        <div class="card-body" id="commenti-todo-${t.id}" style="display:none"></div>
      `;
      list.appendChild(card);
    }
  }

  async function creaTodo() {
    const desc = document.getElementById('todo-desc').value.trim();
    const utenteId = document.getElementById('todo-utente').value;
    if (!desc) { toast('Inserisci una descrizione', true); return; }
    if (!utenteId) { toast('Seleziona un utente', true); return; }
    try {
      await api('POST', '/todo', { descrizione: desc, completato: false, utente: { id: parseInt(utenteId) } });
      document.getElementById('todo-desc').value = '';
      toast('Todo creato!');
      loadTodo();
    } catch(e) { toast(e.message, true); }
  }

  async function toggleCompletato(id, completato, descrizione) {
    try {
      const todo = await api('GET', `/todo/${id}`);
      todo.completato = !completato;
      await api('PUT', `/todo/${id}`, todo);
      toast(`Todo ${!completato ? 'completato' : 'riaperto'}!`);
      loadTodo();
    } catch(e) { toast(e.message, true); }
  }

  async function eliminaTodo(id) {
    if (!confirm('Eliminare questo todo e tutti i suoi commenti?')) return;
    try {
      await api('DELETE', `/todo/${id}`);
      toast('Todo eliminato');
      loadTodo();
    } catch(e) { toast(e.message, true); }
  }

  async function toggleCommentiTodo(id, btn) {
    const body = document.getElementById('commenti-todo-' + id);
    if (body.style.display !== 'none') { body.style.display = 'none'; return; }
    body.style.display = 'block';
    body.innerHTML = '<span class="empty">Caricamento…</span>';
    await renderCommentiTodo(id, body);
  }

  async function renderCommentiTodo(todoId, body) {
    try {
      const commenti = await api('GET', `/todo/${todoId}/commenti`);
      if (!commenti.length) { body.innerHTML = '<p class="empty">Nessun commento.</p>'; }
      else {
        body.innerHTML = commenti.map(c => `
          <div class="comment-item">
            <span class="card-id">#${c.id}</span>
            <span>${esc(c.testo)}</span>
            <button class="btn-danger" onclick="eliminaCommento(${c.id}, ${todoId})">🗑</button>
          </div>`).join('');
      }
      // mini form inline
      body.innerHTML += `
        <div class="form-row" style="margin-top:0.75rem;margin-bottom:0">
          <input type="text" id="inline-comm-${todoId}" placeholder="Nuovo commento…" style="min-width:120px"/>
          <button class="btn-success" onclick="creaCommentoInline(${todoId})">+ Aggiungi</button>
        </div>`;
    } catch(e) { body.innerHTML = `<p class="empty">${e.message}</p>`; }
  }

  async function creaCommentoInline(todoId) {
    const input = document.getElementById('inline-comm-' + todoId);
    const testo = input.value.trim();
    if (!testo) { toast('Inserisci il testo del commento', true); return; }
    try {
      await api('POST', '/commenti', { testo, todo: { id: todoId } });
      input.value = '';
      toast('Commento aggiunto!');
      const body = document.getElementById('commenti-todo-' + todoId);
      await renderCommentiTodo(todoId, body);
    } catch(e) { toast(e.message, true); }
  }

  async function eliminaCommento(id, todoId) {
    try {
      await api('DELETE', `/commenti/${id}`);
      toast('Commento eliminato');
      const body = document.getElementById('commenti-todo-' + todoId);
      if (body && body.style.display !== 'none') await renderCommentiTodo(todoId, body);
    } catch(e) { toast(e.message, true); }
  }

  /* ========== COMMENTI ========== */
  async function loadCommenti() {
    const [commenti, todos] = await Promise.all([api('GET', '/commenti'), api('GET', '/todo')]);

    const sel = document.getElementById('commento-todo');
    sel.innerHTML = todos.map(t => `<option value="${t.id}">${t.descrizione}</option>`).join('');

    const list = document.getElementById('commenti-list');
    list.innerHTML = '';
    if (!commenti.length) { list.innerHTML = '<p class="empty">Nessun commento.</p>'; return; }

    for (const c of commenti) {
      const card = document.createElement('div');
      card.className = 'card';
      const tDesc = c.todo ? esc(c.todo.descrizione) : '—';
      card.innerHTML = `
        <div class="card-header">
          <span class="card-id">#${c.id}</span>
          <span class="card-title">${esc(c.testo)}</span>
          <span style="font-size:0.8rem;color:var(--text-muted)">📋 ${tDesc}</span>
          <button class="btn-danger" onclick="eliminaCommentoGlobal(${c.id})">🗑 Elimina</button>
        </div>
      `;
      list.appendChild(card);
    }
  }

  async function creaCommento() {
    const testo = document.getElementById('commento-testo').value.trim();
    const todoId = document.getElementById('commento-todo').value;
    if (!testo) { toast('Inserisci il testo', true); return; }
    if (!todoId) { toast('Seleziona un todo', true); return; }
    try {
      await api('POST', '/commenti', { testo, todo: { id: parseInt(todoId) } });
      document.getElementById('commento-testo').value = '';
      toast('Commento creato!');
      loadCommenti();
    } catch(e) { toast(e.message, true); }
  }

  async function eliminaCommentoGlobal(id) {
    try {
      await api('DELETE', `/commenti/${id}`);
      toast('Commento eliminato');
      loadCommenti();
    } catch(e) { toast(e.message, true); }
  }

  /* ---- helpers ---- */
  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ---- init ---- */
  loadUtenti();
</script>
</body>
</html>
