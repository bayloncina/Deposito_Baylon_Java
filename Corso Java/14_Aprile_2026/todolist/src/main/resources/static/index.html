<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 40px 16px;
      }

      .card {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        width: 100%;
        max-width: 540px;
        padding: 36px 32px 28px;
      }

      h1 {
        font-size: 1.8rem;
        color: #4a3f8f;
        text-align: center;
        margin-bottom: 28px;
        letter-spacing: -0.5px;
      }

      h1 span {
        display: inline-block;
        margin-right: 8px;
      }

      /* ---- input row ---- */
      .input-row {
        display: flex;
        gap: 10px;
        margin-bottom: 28px;
      }

      .input-row input {
        flex: 1;
        padding: 12px 16px;
        border: 2px solid #ddd;
        border-radius: 12px;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s;
      }

      .input-row input:focus {
        border-color: #764ba2;
      }

      .input-row button {
        padding: 12px 20px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 1.1rem;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.1s;
      }

      .input-row button:hover {
        opacity: 0.9;
      }

      .input-row button:active {
        transform: scale(0.96);
      }

      /* ---- filters ---- */
      .filters {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        justify-content: center;
      }

      .filters button {
        padding: 6px 18px;
        border: 2px solid #ddd;
        border-radius: 20px;
        background: transparent;
        color: #666;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .filters button.active {
        border-color: #764ba2;
        background: #764ba2;
        color: #fff;
      }

      /* ---- list ---- */
      #todo-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 60px;
      }

      .todo-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: #f8f7ff;
        border: 1.5px solid #e8e4f5;
        border-radius: 12px;
        transition: box-shadow 0.2s;
        animation: fadeIn 0.25s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .todo-item:hover {
        box-shadow: 0 4px 14px rgba(118, 75, 162, 0.12);
      }

      .todo-item.completato {
        background: #f0fdf4;
        border-color: #bbf7d0;
      }

      /* checkbox */
      .todo-item input[type="checkbox"] {
        width: 20px;
        height: 20px;
        accent-color: #764ba2;
        cursor: pointer;
        flex-shrink: 0;
      }

      .todo-text {
        flex: 1;
        font-size: 0.95rem;
        color: #333;
        word-break: break-word;
      }

      .todo-item.completato .todo-text {
        text-decoration: line-through;
        color: #999;
      }

      /* delete btn */
      .btn-delete {
        background: none;
        border: none;
        color: #ccc;
        font-size: 1.1rem;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 8px;
        transition:
          color 0.2s,
          background 0.2s;
        line-height: 1;
      }

      .btn-delete:hover {
        color: #e53e3e;
        background: #fff5f5;
      }

      /* ---- empty state ---- */
      .empty {
        text-align: center;
        color: #bbb;
        font-size: 0.9rem;
        padding: 24px 0;
      }

      /* ---- footer counter ---- */
      .footer {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.8rem;
        color: #aaa;
      }

      .footer button {
        background: none;
        border: none;
        color: #e53e3e;
        cursor: pointer;
        font-size: 0.8rem;
        padding: 0;
      }

      .footer button:hover {
        text-decoration: underline;
      }

      /* ---- toast ---- */
      #toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: #333;
        color: #fff;
        padding: 10px 24px;
        border-radius: 999px;
        font-size: 0.85rem;
        opacity: 0;
        transition: all 0.3s ease;
        pointer-events: none;
        z-index: 999;
      }

      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1><span>✅</span>Todo List</h1>

      <div class="input-row">
        <input
          id="new-todo"
          type="text"
          placeholder="Aggiungi un'attivita..."
        />
        <button onclick="addTodo()" title="Aggiungi">+</button>
      </div>

      <div class="filters">
        <button class="active" onclick="setFilter('all', this)">Tutte</button>
        <button onclick="setFilter('attive', this)">Da fare</button>
        <button onclick="setFilter('completate', this)">Completate</button>
      </div>

      <ul id="todo-list"></ul>

      <div class="footer">
        <span id="counter">0 attivita</span>
        <button onclick="deleteCompleted()">Elimina completate</button>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      const API = "/api/todos";
      let todos = [];
      let filtro = "all";

      /* ---- API calls ---- */
      async function fetchTodos() {
        const res = await fetch(API);
        todos = await res.json();
        render();
      }

      async function addTodo() {
        const input = document.getElementById("new-todo");
        const testo = input.value.trim();
        if (!testo) return;

        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ descrizione: testo, completato: false }),
        });

        if (res.ok) {
          input.value = "";
          toast("Attivita aggiunta!");
          fetchTodos();
        }
      }

      async function toggleTodo(id, completato) {
        const todo = todos.find((t) => t.id === id);
        if (!todo) return;

        await fetch(`${API}/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            descrizione: todo.descrizione,
            completato: !completato,
          }),
        });

        fetchTodos();
      }

      async function deleteTodo(id) {
        await fetch(`${API}/${id}`, { method: "DELETE" });
        toast("Attivita eliminata");
        fetchTodos();
      }

      async function deleteCompleted() {
        const completate = todos.filter((t) => t.completato);
        if (completate.length === 0) {
          toast("Nessuna attivita completata");
          return;
        }
        await Promise.all(
          completate.map((t) => fetch(`${API}/${t.id}`, { method: "DELETE" })),
        );
        toast(`${completate.length} attivita eliminate`);
        fetchTodos();
      }

      /* ---- filter ---- */
      function setFilter(f, btn) {
        filtro = f;
        document
          .querySelectorAll(".filters button")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      }

      /* ---- render ---- */
      function render() {
        const lista = document.getElementById("todo-list");
        const filtered = todos.filter((t) => {
          if (filtro === "attive") return !t.completato;
          if (filtro === "completate") return t.completato;
          return true;
        });

        if (filtered.length === 0) {
          lista.innerHTML = '<p class="empty">Nessuna attivita qui</p>';
        } else {
          lista.innerHTML = filtered
            .map(
              (t) => `
        <li class="todo-item ${t.completato ? "completato" : ""}">
          <input type="checkbox" ${t.completato ? "checked" : ""}
                 onchange="toggleTodo(${t.id}, ${t.completato})" />
          <span class="todo-text">${escHtml(t.descrizione)}</span>
          <button class="btn-delete" onclick="deleteTodo(${t.id})" title="Elimina">&#x2715;</button>
        </li>
      `,
            )
            .join("");
        }

        const rimanenti = todos.filter((t) => !t.completato).length;
        document.getElementById("counter").textContent =
          `${rimanenti} ${rimanenti === 1 ? "attivita rimasta" : "attivita rimanenti"}`;
      }

      /* ---- helpers ---- */
      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      let toastTimer;
      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
      }

      /* ---- keyboard shortcut ---- */
      document.getElementById("new-todo").addEventListener("keydown", (e) => {
        if (e.key === "Enter") addTodo();
      });

      /* ---- init ---- */
      fetchTodos();
    </script>
  </body>
</html>
