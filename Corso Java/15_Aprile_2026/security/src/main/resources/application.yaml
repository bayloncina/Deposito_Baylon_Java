spring:
  application:
    name: security
  datasource:
    url: jdbc:mysql://localhost:3306/security?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  security:
    user:
      name: admin
      password: 1234
      roles: USER
server:
  port: 8081
